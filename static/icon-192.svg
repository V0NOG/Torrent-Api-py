<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background with subtle gradient feel via two rects -->
  <rect width="192" height="192" rx="42" fill="#0d0d1a"/>
  <rect width="192" height="192" rx="42" fill="url(#bg)" opacity="0.3"/>
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Play triangle -->
  <polygon points="66,48 156,96 66,144" fill="#0a84ff" filter="url(#glow)"/>
  <!-- Left accent bar -->
  <rect x="36" y="48" width="18" height="96" rx="9" fill="#0a84ff" opacity="0.5"/>
</svg>
